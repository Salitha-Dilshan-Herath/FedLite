<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FL Dashboard — Communication-Efficient Federated Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --bg-card-hover: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #06b6d4;
      --accent-hover: #22d3ee;
      --accent-muted: rgba(6, 182, 212, 0.15);
      --border: #334155;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
    }

    .layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header p {
      margin: 8px 0 0;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 32px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .card h3 {
      margin: 0 0 20px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card + .card { margin-top: 24px; }

    /* Form */
    .form-section {
      margin-bottom: 24px;
    }

    .form-section:last-of-type { margin-bottom: 0; }

    .form-section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      transition: border-color var(--transition);
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .form-row {
      display: flex;
      gap: 16px;
    }

    .form-row .form-group { flex: 1; }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .checkbox-group label {
      font-size: 0.9rem;
      cursor: pointer;
      margin: 0;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--bg-primary);
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition);
      margin-top: 20px;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .btn:active { transform: scale(0.98); }

    /* Progress */
    .progress-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .progress-section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .progress-item {
      margin-bottom: 14px;
    }

    .progress-item:last-child { margin-bottom: 0; }

    .progress-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .progress-item-label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .progress-item.active .progress-item-label {
      color: var(--accent);
    }

    .progress-item.completed .progress-item-label {
      color: var(--success);
    }

    .progress-item-round {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .progress-item.active .progress-item-round {
      color: var(--accent);
    }

    .progress-track {
      height: 6px;
      background: var(--bg-primary);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--border);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .progress-item.active .progress-bar {
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
    }

    .progress-item.completed .progress-bar {
      background: var(--success);
    }

    .status-text {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 10px;
    }

    .status-text.running { color: var(--accent); }
    .status-text.done { color: var(--success); }
    .status-text.error { color: var(--error); }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: var(--bg-primary);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: var(--accent-muted); }

    td:first-child { font-weight: 500; }

    td .metric { color: var(--accent); font-weight: 600; }

    /* Plots */
    .plot-card img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: #0c1222;
    }

    /* Placeholder */
    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      text-align: center;
      color: var(--text-muted);
    }

    .placeholder p {
      max-width: 320px;
      line-height: 1.7;
    }

    .tip {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="layout">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
